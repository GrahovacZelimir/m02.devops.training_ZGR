version: v1.0
name: "\U0001F40D Python CI/CD Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
auto_cancel:
  queued:
    when: 'true'
fail_fast:
  cancel:
    when: branch != 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p .pip_cache
blocks:
  - name: "\U0001F4E6 Setup Dependencies"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F4E6 Install dependencies"
          commands:
            - echo "Installing dependencies...."
            - pip install pytest requests flask coverage locust flask-limiter
            - cache store
  - name: Integration tests
    dependencies:
      - "\U0001F9EA Unit Tests"
    task:
      jobs:
        - name: Run tests
          commands:
            - cache restore
            - 'cd 3-integration-testing '
            - 'python -m pytest test_integration.py -v '
            - cd ..
            - 'cd 6-mocking '
            - 'python -m pytest test_weather_service.py -v '
            - cd ..
            - 'cd 10-database-testing '
            - python -m pytest test_database.py -v
    run:
      when: 'false'
  - name: "\U0001F9EA Unit Tests"
    dependencies:
      - "\U0001F4E6 Setup Dependencies"
    task:
      jobs:
        - name: "\U0001F9EA pytest unit"
          commands:
            - cache restore
            - 'cd 1-tdd '
            - 'python -m pytest test_factorial.py -v '
            - python -m pytest test_fibonacci.py -v
            - cd ..
            - 'cd 2-unit-testing '
            - python -m pytest test_math_sum.py -v
  - name: E2E tests
    dependencies:
      - Integration tests
    task:
      jobs:
        - name: Run tests
          commands:
            - cache restore
            - 'cd 4-e2e '
            - pip install -r requirements.txt
            - pip install flask_limiter
            - nohup python app.py &
            - '# wait until app is ready - running state'
            - 'until curl -s http://127.0.0.1:5000/health; do sleep 1; done'
            - python -m pytest test_e2e.py -v
      epilogue:
        always:
          commands:
            - test-results publish junit_integration.xml
    run:
      when: 'false'
  - name: Performance tests
    dependencies:
      - E2E tests
      - "\U0001F4E6 Setup Dependencies"
    task:
      jobs:
        - name: Run tests
          commands:
            - 'set -e  # fail fast if anything breaks'
            - '#export DISABLE_RATE_LIMIT=1'
            - '# Install dependencies'
            - cd 4-e2e
            - pip install -r requirements.txt
            - pip install flask_limiter
            - cd ..
            - cd 8-performance-testing
            - pip install locust
            - '# Start Flask app in background'
            - 'python -c "import sys; sys.path.insert(0, ''../4-e2e''); from app import app; app.run()" > flask.log 2>&1 &'
            - APP_PID=$!
            - '# wait until app is ready - running state'
            - 'until curl -s http://127.0.0.1:5000/health; do sleep 1; done'
            - '# Run Locust (this will block until finished)'
            - 'locust -f locustfile.py --host=http://127.0.0.1:5000 --headless -u 10 -r 2 --run-time 30s'
            - '# Kill Flask app after test'
            - kill $APP_PID
    run:
      when: 'false'
  - name: "\U0001F6E1️Security Checks"
    dependencies:
      - Performance tests
      - "\U0001F4E6 Setup Dependencies"
    task:
      jobs:
        - name: 'Run tests '
          commands:
            - '# Install dependencies'
            - cd 4-e2e
            - pip install -r requirements.txt
            - pip install flask_limiter
            - cd ..
            - 'cd 9-security-testing '
            - '# Start Flask app in background'
            - 'python -c "import sys; sys.path.insert(0, ''../4-e2e''); from app import app; app.run()" > flask.log 2>&1 &'
            - APP_PID=$!
            - '# wait until app is ready - running state'
            - 'until curl -s http://127.0.0.1:5000/health; do sleep 1; done'
            - python -m pytest test_security.py -v
            - '# Kill Flask app after test'
            - kill $APP_PID
    run:
      when: 'false'
  - name: Coverage
    dependencies:
      - "\U0001F4E6 Setup Dependencies"
    task:
      jobs:
        - name: Check coverage
          commands:
            - cd 7-test-coverage
            - pip install coverage
            - 'coverage run -m pytest test_calculator.py -v '
            - coverage report -m
  - name: Test Report
    dependencies:
      - "\U0001F4E6 Setup Dependencies"
    task:
      jobs:
        - name: Create report
          commands:
            - cd 5-test-reports
            - pip install -r requirements.txt
            - pytest --junitxml=report.xml
            - '[[ -f report.xml ]] && test-results publish report.xml'
after_pipeline:
  task:
    jobs:
      - name: "\U0001F4CA Merge reports"
        commands:
          - test-results gen-pipeline-report
